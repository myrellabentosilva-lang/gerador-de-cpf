<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de CPF Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="glass-card">
        <div class="icon">✨</div>
        <h1>Gerador de CPF</h1>
        <p>Gere números válidos para testes de software</p>
        
        <div class="display-container">
            <span id="cpf-display">000.000.000-00</span>
            <button id="btn-copy" title="Copiar">📋</button>
        </div>
        
        <button id="btn-gerar" class="main-button">Gerar Novo CPF</button>
        
        <div id="toast" class="toast">Copiado com sucesso!</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
